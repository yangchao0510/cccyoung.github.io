<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>团队日报 · 完整功能</title>
    <style>
        /* ===== CSS 变量 & 重置 ===== */
        :root {
            --primary: #4F6EF7;
            --primary-light: #EEF1FE;
            --primary-dark: #3A56D4;
            --success: #34C759;
            --danger: #FF3B30;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;
            --radius: 14px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 8px 28px rgba(79, 110, 247, 0.12);
            --transition: all 0.25s ease;
            --sidebar-width: 260px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            height: 100vh;
            overflow: hidden;
        }

        .app-layout {
            display: flex;
            height: 100vh;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            background: #fff;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.04);
        }

        /* ===== 左侧边栏 ===== */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: var(--gray-50);
            border-right: 1px solid var(--gray-200);
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow: hidden;
            z-index: 10;
        }

        .sidebar-header {
            padding: 16px 18px 12px;
            font-size: 18px;
            font-weight: 700;
            color: var(--gray-800);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--gray-200);
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 6px;
        }
        .sidebar-header .left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar-header .left .icon {
            font-size: 22px;
        }
        .sidebar-header .right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar-header .right .member-count {
            font-size: 14px;
            font-weight: 400;
            color: var(--gray-400);
        }
        .btn-full-record {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 5px 14px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            touch-action: manipulation;
            white-space: nowrap;
            display: inline-block;
        }
        .btn-full-record:hover {
            background: var(--primary-dark);
        }
        .btn-full-record:active {
            transform: scale(0.95);
        }
        .btn-full-record.active {
            background: var(--gray-300);
            color: var(--gray-700);
        }

        .member-list-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px 12px;
        }

        .member-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .member-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 2px;
            user-select: none;
            touch-action: manipulation;
        }

        .member-item:hover {
            background: var(--gray-200);
        }

        .member-item.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 12px rgba(79, 110, 247, 0.25);
        }

        .member-item .name {
            font-weight: 500;
            font-size: 15px;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .member-item .del-btn {
            background: transparent;
            border: none;
            color: var(--gray-400);
            font-size: 16px;
            cursor: pointer;
            padding: 0 4px;
            border-radius: 6px;
            transition: var(--transition);
            line-height: 1;
            touch-action: manipulation;
            opacity: 0;
        }

        .member-item:hover .del-btn,
        .member-item .del-btn:focus {
            opacity: 1;
        }

        .member-item .del-btn:hover {
            color: var(--danger);
            background: rgba(255, 59, 48, 0.1);
        }

        .member-item.active .del-btn {
            color: rgba(255, 255, 255, 0.7);
            opacity: 1;
        }
        .member-item.active .del-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.2);
        }

        /* 全部成员特殊样式 */
        .member-item.all-member {
            border-bottom: 1px solid var(--gray-200);
            margin-bottom: 6px;
            padding-bottom: 12px;
        }
        .member-item.all-member .name {
            font-weight: 600;
        }
        .member-item.all-member .name .icon {
            margin-right: 6px;
        }

        .data-sync-area {
            padding: 8px 16px 4px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-top: 1px solid var(--gray-200);
            background: var(--gray-50);
        }
        .btn-export, .btn-import {
            padding: 6px 14px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            flex: 1;
            min-width: 80px;
            touch-action: manipulation;
        }
        .btn-export {
            background: var(--gray-200);
            color: var(--gray-700);
        }
        .btn-export:hover {
            background: var(--gray-300);
        }
        .btn-import {
            background: var(--primary);
            color: #fff;
        }
        .btn-import:hover {
            background: var(--primary-dark);
        }

        .add-member-area {
            padding: 14px 16px 20px;
            border-top: 1px solid var(--gray-200);
            flex-shrink: 0;
            background: var(--gray-50);
        }

        .add-member-area .input-group {
            display: flex;
            gap: 8px;
        }

        .add-member-area input {
            flex: 1;
            padding: 10px 12px;
            border: 1.5px solid var(--gray-200);
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: var(--transition);
            background: #fff;
            min-width: 0;
        }

        .add-member-area input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 110, 247, 0.1);
        }

        .add-member-area .add-btn {
            padding: 10px 16px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            touch-action: manipulation;
        }

        .add-member-area .add-btn:hover {
            background: var(--primary-dark);
        }
        .add-member-area .add-btn:active {
            transform: scale(0.95);
        }

        /* ===== 右侧主内容 ===== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background: #fff;
            padding: 0;
        }

        .workspace-header {
            padding: 16px 28px 12px;
            border-bottom: 1px solid var(--gray-200);
            flex-shrink: 0;
            background: #fff;
        }

        .workspace-header .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .workspace-header .member-title {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .workspace-header .member-title .count {
            font-size: 14px;
            font-weight: 400;
            color: var(--gray-400);
            background: var(--gray-100);
            padding: 2px 14px;
            border-radius: 20px;
        }

        .mobile-toggle {
            display: none;
            background: var(--gray-100);
            border: none;
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 20px;
            cursor: pointer;
            touch-action: manipulation;
        }

        /* 控制按钮 */
        .toggle-btn {
            background: var(--gray-100);
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-700);
            cursor: pointer;
            transition: var(--transition);
            touch-action: manipulation;
            white-space: nowrap;
        }
        .toggle-btn:hover {
            background: var(--gray-200);
        }
        .toggle-btn:active {
            transform: scale(0.95);
        }
        .toggle-btn.active-btn {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        /* 隐藏区域 */
        .hidden-section {
            display: none !important;
        }

        /* 导出栏 */
        .export-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            padding-bottom: 4px;
            margin-top: 8px;
        }
        .export-row label {
            font-weight: 500;
            font-size: 14px;
            color: var(--gray-600);
            white-space: nowrap;
        }
        .export-row input[type="date"] {
            padding: 6px 10px;
            border: 1.5px solid var(--gray-200);
            border-radius: 8px;
            font-size: 14px;
            background: #fff;
            flex: 1;
            min-width: 140px;
        }
        .export-row input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.08);
        }
        .export-row .btn-export-report {
            padding: 6px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            background: var(--primary);
            color: #fff;
            touch-action: manipulation;
            transition: var(--transition);
        }
        .export-row .btn-export-report:hover {
            background: var(--primary-dark);
        }
        .export-row .btn-export-report:active {
            transform: scale(0.95);
        }

        /* 搜索栏 */
        .search-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px 14px;
            background: var(--gray-50);
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid var(--gray-200);
            margin-top: 8px;
        }

        .search-bar .search-group {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            flex: 1 1 150px;
        }

        .search-bar .search-group label {
            font-size: 13px;
            font-weight: 500;
            color: var(--gray-600);
            white-space: nowrap;
        }

        .search-bar .search-group input[type="date"],
        .search-bar .search-group input[type="text"],
        .search-bar .search-group select {
            padding: 6px 10px;
            border: 1.5px solid var(--gray-200);
            border-radius: 8px;
            font-size: 13px;
            background: #fff;
            outline: none;
            transition: var(--transition);
            flex: 1;
            min-width: 80px;
        }

        .search-bar .search-group input:focus,
        .search-bar .search-group select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.08);
        }

        .search-bar .search-group .global-check {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: var(--gray-600);
            cursor: pointer;
        }

        .search-bar .search-group .global-check input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .search-bar .search-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .search-bar .search-actions button {
            padding: 6px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
            touch-action: manipulation;
        }

        .search-bar .search-actions .btn-search {
            background: var(--primary);
            color: #fff;
        }
        .search-bar .search-actions .btn-search:hover {
            background: var(--primary-dark);
        }
        .search-bar .search-actions .btn-reset {
            background: var(--gray-200);
            color: var(--gray-700);
        }
        .search-bar .search-actions .btn-reset:hover {
            background: var(--gray-300);
        }

        .workspace-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 20px 28px 40px;
        }

        /* 空状态 */
        .empty-member-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--gray-400);
            text-align: center;
        }
        .empty-member-state .big-icon {
            font-size: 56px;
            margin-bottom: 16px;
        }
        .empty-member-state h3 {
            color: var(--gray-600);
            margin-bottom: 6px;
        }
        .empty-member-state p {
            font-size: 15px;
        }

        .report-item {
            border: 1.5px solid var(--gray-100);
            border-radius: 12px;
            padding: 18px 18px 14px;
            margin-bottom: 16px;
            transition: var(--transition);
            background: #fff;
        }

        .report-item:hover {
            border-color: var(--gray-200);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            user-select: none;
        }
        .report-header .report-author {
            font-weight: 600;
            color: var(--gray-700);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .report-header .report-author .toggle-icon {
            display: inline-block;
            transition: transform 0.2s ease;
            font-size: 14px;
            color: var(--gray-400);
            margin-right: 4px;
        }
        .report-header .report-author .toggle-icon.expanded {
            transform: rotate(90deg);
        }

        .report-date {
            font-size: 13px;
            color: var(--gray-400);
            background: var(--gray-50);
            padding: 2px 14px;
            border-radius: 12px;
            font-weight: 500;
        }

        .report-detail-wrapper {
            display: block;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .report-detail-wrapper.collapsed {
            display: none;
        }

        .report-body .label {
            font-weight: 600;
            color: var(--gray-600);
            font-size: 13px;
            display: block;
            margin-top: 10px;
        }
        .report-body .label:first-child {
            margin-top: 0;
        }

        /* 问题列表展示 */
        .problem-list {
            margin: 6px 0 4px;
        }
        .problem-item {
            display: block;
            padding: 6px 8px;
            margin-bottom: 6px;
            background: var(--gray-50);
            border-radius: 8px;
            border-left: 3px solid var(--primary);
            font-size: 14px;
        }
        .problem-item .p-label {
            font-weight: 600;
            color: var(--gray-600);
        }
        .problem-item .p-value {
            color: var(--gray-700);
        }
        /* 前一日对比信息 */
        .prev-info {
            color: var(--gray-400);
            font-size: 13px;
            margin-top: 2px;
            padding-left: 6px;
            border-left: 2px solid var(--gray-200);
        }

        .report-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid var(--gray-100);
        }

        .btn-danger-small {
            background: var(--danger);
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            touch-action: manipulation;
        }
        .btn-danger-small:hover {
            background: #d63031;
        }
        .btn-danger-small:active {
            transform: scale(0.95);
        }

        .empty-reports {
            text-align: center;
            padding: 40px 0;
            color: var(--gray-400);
        }
        .empty-reports .icon {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
        }

        .submit-card {
            background: var(--gray-50);
            border-radius: 14px;
            padding: 20px 22px;
            margin-top: 0;
            margin-bottom: 20px;
            border: 1px solid var(--gray-200);
        }

        .submit-card .form-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 4px;
        }
        .form-group label .required {
            color: var(--danger);
            margin-left: 2px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--gray-200);
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            color: var(--gray-800);
            background: #fff;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 110, 247, 0.08);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 70px;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            touch-action: manipulation;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            box-shadow: 0 6px 18px rgba(79, 110, 247, 0.25);
        }
        .btn-primary:active {
            transform: scale(0.97);
        }

        /* 智能识别按钮 */
        .btn-smart {
            background: #8B5CF6;
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            touch-action: manipulation;
            margin-top: 6px;
        }
        .btn-smart:hover {
            background: #7C3AED;
        }
        .btn-smart:active {
            transform: scale(0.95);
        }

        /* API Key 设置区域 */
        .api-key-area {
            margin: 6px 0 10px;
            padding: 10px 12px;
            background: #fff;
            border: 1px dashed var(--gray-300);
            border-radius: 8px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }
        .api-key-area label {
            font-size: 13px;
            font-weight: 500;
            color: var(--gray-600);
        }
        .api-key-area input {
            flex: 1;
            min-width: 200px;
            padding: 6px 10px;
            border: 1.5px solid var(--gray-200);
            border-radius: 6px;
            font-size: 13px;
            background: #fff;
        }
        .api-key-area input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.08);
        }
        .api-key-area .hint {
            font-size: 12px;
            color: var(--gray-400);
        }
        .api-key-area .hint a {
            color: var(--primary);
            text-decoration: none;
        }
        .api-key-area .hint a:hover {
            text-decoration: underline;
        }

        /* 动态问题列表 */
        .problem-entries {
            margin-bottom: 10px;
        }
        .problem-entry {
            background: #fff;
            border: 1px solid var(--gray-200);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 10px;
            position: relative;
        }
        .problem-entry .remove-problem {
            position: absolute;
            top: 6px;
            right: 10px;
            background: none;
            border: none;
            color: var(--gray-400);
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
            transition: var(--transition);
        }
        .problem-entry .remove-problem:hover {
            color: var(--danger);
        }
        .problem-entry .form-row {
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .problem-entry .form-group {
            margin-bottom: 8px;
        }
        .problem-entry .form-group label {
            font-size: 12px;
            margin-bottom: 2px;
        }
        .problem-entry .form-group input,
        .problem-entry .form-group select {
            padding: 6px 10px;
            font-size: 13px;
        }

        .btn-add-problem {
            background: var(--gray-200);
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            color: var(--gray-700);
            cursor: pointer;
            transition: var(--transition);
            touch-action: manipulation;
        }
        .btn-add-problem:hover {
            background: var(--gray-300);
        }
        .btn-add-problem:active {
            transform: scale(0.95);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--gray-900);
            color: #fff;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transition: all 0.4s ease;
