    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        (function() {
            'use strict';

            // ============================================================
            //  云端同步配置（请替换为您的实际值）
            // ============================================================
            const CLOUD_BIN_ID = '6a432fa1da38895dfe1388a9';        // 例如：'5f8f8f8f8f8f8f8f8f8f8f8f'
            const CLOUD_MASTER_KEY = '$2a$10$JNDHMNgtLF/ve0dDqON0Eu.m6AEL9tJTzrhPqUtZz9VeaX.MkWpoC'; // 例如：'$2b$10$abcdefghijklmnopqrstuvwxyz'

            // ============================================================
            //  数据层
            // ============================================================
            const MEMBERS_KEY = 'team_members';
            const REPORTS_KEY = 'team_reports';
            const API_KEY_STORAGE = 'deepseek_api_key';

            function loadMembers() {
                try {
                    const data = localStorage.getItem(MEMBERS_KEY);
                    return data ? JSON.parse(data) : [];
                } catch { return []; }
            }

            function saveMembers(members) {
                localStorage.setItem(MEMBERS_KEY, JSON.stringify(members));
            }

            function loadReports() {
                try {
                    const data = localStorage.getItem(REPORTS_KEY);
                    return data ? JSON.parse(data) : [];
                } catch { return []; }
            }

            function saveReports(reports) {
                localStorage.setItem(REPORTS_KEY, JSON.stringify(reports));
            }

            function getApiKey() {
                return localStorage.getItem(API_KEY_STORAGE) || '';
            }

            function setApiKey(key) {
                localStorage.setItem(API_KEY_STORAGE, key);
            }

            function generateId() {
                return Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
            }

            function getTodayStr() {
                const d = new Date();
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${y}-${m}-${day}`;
            }

            function formatDate(dateStr) {
                if (!dateStr) return '';
                const d = new Date(dateStr);
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${y}-${m}-${day}`;
            }

            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // ============================================================
            //  云端同步函数
            // ============================================================
            async function syncToCloud() {
                try {
                    const data = {
                        members: loadMembers(),
                        reports: loadReports(),
                        updatedAt: new Date().toISOString()
                    };
                    const response = await fetch(`https://api.jsonbin.io/v3/b/${CLOUD_BIN_ID}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Master-Key': CLOUD_MASTER_KEY
                        },
                        body: JSON.stringify(data)
                    });
                    if (!response.ok) {
                        console.warn('云端同步失败:', response.status);
                    } else {
                        console.log('✅ 数据已同步到云端');
                    }
                } catch (err) {
                    console.warn('云端同步出错:', err);
                }
            }

            async function loadFromCloud() {
                try {
                    const response = await fetch(`https://api.jsonbin.io/v3/b/${CLOUD_BIN_ID}/latest`, {
                        headers: {
                            'X-Master-Key': CLOUD_MASTER_KEY
                        }
                    });
                    if (!response.ok) {
                        console.warn('云端加载失败:', response.status);
                        return false;
                    }
                    const result = await response.json();
                    const data = result.record;
                    if (data && data.members && data.reports) {
                        saveMembers(data.members);
                        saveReports(data.reports);
                        console.log('✅ 从云端加载数据成功');
                        return true;
                    }
                    return false;
                } catch (err) {
                    console.warn('云端加载出错:', err);
                    return false;
                }
            }

            // ============================================================
            //  导出日报（新格式：无成员名，无字段标签，序号拼接）
            // ============================================================
            function exportDailyReports(date) {
                if (!date) {
                    showToast('请选择日期', 'error');
                    return;
                }

                const allReports = loadReports();
                const members = loadMembers();

                const filtered = allReports.filter(r => r.date === date);
                if (filtered.length === 0) {
                    showToast(`📭 ${date} 没有日报记录`, 'warning');
                    return;
                }

                // 收集所有问题（扁平化）
                let allProblems = [];
                for (let r of filtered) {
                    if (r.problems && r.problems.length) {
                        for (let p of r.problems) {
                            // 至少有一个字段有值才添加
                            if (p.name || p.detail || p.progress) {
                                allProblems.push(p);
                            }
                        }
                    }
                }

                // 构建纯文本内容
                let text = `📋 日报汇总 · ${date}\n`;
                if (allProblems.length === 0) {
                    text += `暂无问题记录`;
                } else {
                    text += `共 ${allProblems.length} 个问题\n\n`;
                    for (let i = 0; i < allProblems.length; i++) {
                        let p = allProblems[i];
                        let line = `${i+1}、`;
                        if (p.name) {
                            line += p.name;
                            if (p.detail || p.progress) {
                                line += '：';
                                if (p.detail) {
                                    line += p.detail;
                                    if (p.progress) {
                                        line += `。${p.progress}`;
                                    }
                                    // 有详情，加句号（如果没有进展，也加句号）
                                    if (!p.progress) {
                                        line += '。';
                                    }
                                } else if (p.progress) {
                                    // 没有详情，只有进展
                                    line += p.progress + '。';
                                }
                            } else {
                                // 只有名称，加句号
                                line += '。';
                            }
                        } else {
                            // 没有名称
                            if (p.detail) {
                                line += p.detail;
                                if (p.progress) {
                                    line += `。${p.progress}`;
                                }
                                line += '。';
                            } else if (p.progress) {
                                line += p.progress + '。';
                            }
                        }
                        text += line + '\n';
                    }
                }

                // 显示模态框
                const overlay = document.getElementById('exportModalOverlay');
                const body = document.getElementById('exportModalBody');
                body.textContent = text;
                overlay.classList.add('active');

                // 绑定复制事件
                const copyBtn = document.getElementById('modalCopyBtn');
                copyBtn.onclick = function() {
                    navigator.clipboard.writeText(text).then(() => {
                        showToast('✅ 已复制到剪贴板', 'success');
                    }).catch(() => {
                        const range = document.createRange();
                        range.selectNode(body);
                        window.getSelection().removeAllRanges();
                        window.getSelection().addRange(range);
                        document.execCommand('copy');
                        showToast('✅ 已复制到剪贴板', 'success');
                    });
                };

                // 关闭模态框
                const closeModal = function() {
                    overlay.classList.remove('active');
                };
                document.getElementById('modalCloseBtn').onclick = closeModal;
                document.getElementById('modalCloseFooterBtn').onclick = closeModal;
                overlay.onclick = function(e) {
                    if (e.target === overlay) {
                        closeModal();
                    }
                };
            }

            // ============================================================
            //  状态
            // ============================================================
            let selectedMemberId = null; // null 或 'all' 或具体成员ID
            let searchFilters = {
                name: '',
                date: '',
                keyword: '',
                risk: '',
                global: false
            };

            // ============================================================
            //  Toast
            // ============================================================
            let toastTimer = null;

            function showToast(message, type = 'success') {
                const el = document.getElementById('toast');
                el.textContent = message;
                el.className = 'toast ' + type;
                void el.offsetWidth;
                el.classList.add('show');
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => {
                    el.classList.remove('show');
                }, 2800);
            }

            // ============================================================
            //  隐藏表单辅助
            // ============================================================
            function hideForm() {
                const card = document.getElementById('submitCard');
                if (card) {
                    card.classList.add('hidden-section');
                }
                const btn = document.getElementById('toggleFormBtn');
                if (btn) {
                    btn.classList.remove('active-btn');
                }
            }

            // ============================================================
            //  多问题智能识别函数
            // ============================================================
            async function smartRecognizeMultiple(text) {
                if (!text) return [];

                const apiKey = getApiKey();
                if (apiKey) {
                    try {
                        const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${apiKey}`
                            },
                            body: JSON.stringify({
                                model: 'deepseek-chat',
                                messages: [{
                                    role: 'system',
                                    content: '你是一个智能信息提取助手。请从用户输入的日报内容中，识别出所有问题块。每个问题块包含"问题名称"、"问题详情"、"问题进展"、"是否存在风险"四个字段。如果某个字段没有明确信息，则返回空字符串。请以合法的JSON数组格式返回，数组中的每个元素是一个对象，包含 name, detail, progress, risk 四个字段。例如：[{"name":"登录超时","detail":"用户反馈登录响应缓慢","progress":"已定位到数据库连接池问题","risk":"是"}]。只返回JSON数组，不要有其他内容。'
                                }, {
                                    role: 'user',
                                    content: text
                                }],
                                temperature: 0.1,
                                max_tokens: 500
                            })
                        });

                        if (!response.ok) {
                            if (response.status === 402) {
                                throw new Error('API余额不足 (402)');
                            } else {
                                throw new Error(`API请求失败 (HTTP ${response.status})`);
                            }
                        }

                        const data = await response.json();
                        const content = data.choices?.[0]?.message?.content || '';
                        const jsonMatch = content.match(/\[[\s\S]*\]/);
                        if (jsonMatch) {
                            const parsed = JSON.parse(jsonMatch[0]);
                            if (Array.isArray(parsed)) {
                                return parsed.map(p => ({
                                    name: p.name || '',
                                    detail: p.detail || '',
                                    progress: p.progress || '',
                                    risk: p.risk || ''
                                }));
                            }
                        }
                        return ruleBasedRecognizeMultiple(text);
                    } catch (error) {
                        console.warn('DeepSeek API 调用失败:', error.message);
                        if (error.message.includes('402')) {
                            throw new Error('余额不足，已使用规则识别');
                        }
                        throw new Error('API调用失败，已使用规则识别');
                    }
                } else {
                    console.log('未设置 API Key，使用规则识别');
                    return ruleBasedRecognizeMultiple(text);
                }
            }

            function ruleBasedRecognizeMultiple(text) {
                const problems = [];
                const blocks = text.split(/\n\s*\n/);
                for (let block of blocks) {
                    block = block.trim();
                    if (!block) continue;
                    let name = '',
                        detail = '',
                        progress = '',
                        risk = '';
                    const lines = block.split('\n');
                    for (let line of lines) {
                        line = line.trim();
                        if (!line) continue;
                        const lower = line.toLowerCase();
                        if (lower.includes('问题名称') || lower.includes('名称') || lower.includes('标题')) {
                            const parts = line.split(/[:：]/);
                            if (parts.length > 1) name = parts.slice(1).join(':').trim();
                            else name = line;
                        } else if (lower.includes('问题详情') || lower.includes('详情') || lower.includes('描述')) {
                            const parts = line.split(/[:：]/);
                            if (parts.length > 1) detail = parts.slice(1).join(':').trim();
                            else detail = line;
                        } else if (lower.includes('问题进展') || lower.includes('进展') || lower.includes('状态')) {
                            const parts = line.split(/[:：]/);
                            if (parts.length > 1) progress = parts.slice(1).join(':').trim();
                            else progress = line;
                        } else if (lower.includes('是否存在风险') || lower.includes('风险') || lower.includes('是否')) {
                            const parts = line.split(/[:：]/);
                            if (parts.length > 1) risk = parts.slice(1).join(':').trim();
                            else risk = line;
                        } else {
                            if (!name && !detail) detail = line;
                            else if (!detail) detail = line;
                        }
                    }
                    if (name || detail || progress || risk) {
                        problems.push({ name, detail, progress, risk });
                    }
                }
                if (problems.length === 0 && text.trim()) {
                    let name = '',
                        detail = text,
                        progress = '',
                        risk = '';
                    const lines = text.split('\n');
                    for (let line of lines) {
                        const lower = line.toLowerCase();
                        if (lower.includes('问题名称') || lower.includes('名称')) {
                            const parts = line.split(/[:：]/);
                            if (parts.length > 1) name = parts.slice(1).join(':').trim();
                            else name = line;
                        } else if (lower.includes('进展')) {
                            const parts = line.split(/[:：]/);
                            if (parts.length > 1) progress = parts.slice(1).join(':').trim();
                            else progress = line;
                        } else if (lower.includes('风险')) {
                            const parts = line.split(/[:：]/);
                            if (parts.length > 1) risk = parts.slice(1).join(':').trim();
                            else risk = line;
                        }
                    }
                    problems.push({ name, detail, progress, risk });
                }
                return problems;
            }

            // ============================================================
            //  添加问题条目
            // ============================================================
            function addProblemEntry(container, values) {
                values = values || { name: '', detail: '', progress: '', risk: '' };
                const entry = document.createElement('div');
                entry.className = 'problem-entry';
                entry.innerHTML = `
                    <button type="button" class="remove-problem" title="删除此问题">✕</button>
                    <div class="form-row">
                        <div class="form-group">
                            <label>问题名称</label>
                            <input type="text" class="p-name" placeholder="如：登录超时" value="${escapeHtml(values.name)}" />
                        </div>
                        <div class="form-group">
                            <label>问题详情</label>
                            <input type="text" class="p-detail" placeholder="详细描述" value="${escapeHtml(values.detail)}" />
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>问题进展</label>
                            <input type="text" class="p-progress" placeholder="如：已修复" value="${escapeHtml(values.progress)}" />
                        </div>
                        <div class="form-group">
                            <label>是否存在风险</label>
                            <select class="p-risk">
                                <option value="">请选择</option>
                                <option value="是" ${values.risk === '是' ? 'selected' : ''}>是</option>
                                <option value="否" ${values.risk === '否' ? 'selected' : ''}>否</option>
                            </select>
                        </div>
                    </div>
                `;
                const removeBtn = entry.querySelector('.remove-problem');
                removeBtn.addEventListener('click', function() {
                    if (container.children.length > 1) {
                        entry.remove();
                    } else {
                        showToast('至少保留一个问题条目', 'warning');
                    }
                });
                container.appendChild(entry);
            }

            // ============================================================
            //  渲染：成员侧边栏
            // ============================================================
            function renderSidebar() {
                const members = loadMembers();
                const list = document.getElementById('memberList');
                const countEl = document.getElementById('memberCount');

                countEl.textContent = members.length;

                let html = `
                    <li class="member-item all-member ${selectedMemberId === 'all' ? 'active' : ''}" data-id="all">
                        <span class="name"><span class="icon">🌐</span> 全部成员</span>
                        <span style="font-size:12px;color:var(--gray-400);">${loadReports().length} 篇</span>
                    </li>
                `;

                if (members.length === 0) {
                    html += `
                        <li style="padding: 20px 12px; color: var(--gray-400); font-size: 14px; text-align: center; list-style: none;">
                            暂无成员，添加一位吧
                        </li>
                    `;
                } else {
                    for (const member of members) {
                        const active = (member.id === selectedMemberId) ? 'active' : '';
                        const name = escapeHtml(member.name);
                        html += `
                            <li class="member-item ${active}" data-id="${member.id}">
                                <span class="name">${name}</span>
                                <button class="del-btn" data-id="${member.id}" title="删除成员">✕</button>
                            </li>
                        `;
                    }
                }
                list.innerHTML = html;

                const allItem = list.querySelector('[data-id="all"]');
                if (allItem) {
                    allItem.addEventListener('click', function(e) {
                        if (e.target.classList.contains('del-btn')) return;
                        selectMember('all');
                    });
                }

                list.querySelectorAll('.member-item:not(.all-member)').forEach(item => {
                    const id = item.dataset.id;
                    item.addEventListener('click', function(e) {
                        if (e.target.classList.contains('del-btn')) return;
                        selectMember(id);
                    });
                });

                list.querySelectorAll('.del-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const id = this.dataset.id;
                        deleteMember(id);
                    });
                });

                const fullBtn = document.getElementById('fullRecordBtn');
                if (fullBtn) {
                    if (selectedMemberId === 'all') {
                        fullBtn.classList.add('active');
                        fullBtn.textContent = '📊 所有成员';
                    } else {
                        fullBtn.classList.remove('active');
                        fullBtn.textContent = '📊 完整记录';
                    }
                }

                if (selectedMemberId === 'all' && members.length === 0) {
                    selectedMemberId = null;
                }

                if (selectedMemberId && selectedMemberId !== 'all') {
                    const exists = members.some(m => m.id === selectedMemberId);
                    if (!exists) {
                        selectedMemberId = members.length > 0 ? members[0].id : null;
                    }
                }

                if (!selectedMemberId) {
                    if (members.length > 0) {
                        selectedMemberId = 'all';
                    }
                }

                renderWorkspace(selectedMemberId);
            }

            // ============================================================
            //  选择成员
            // ============================================================
            function selectMember(id) {
                if (id === 'all') {
                    selectedMemberId = 'all';
                    document.getElementById('globalSearch').checked = true;
                    searchFilters.global = true;
                    clearSearch();
                    hideForm();
                    renderSidebar();
                    return;
                }

                const members = loadMembers();
                const exists = members.some(m => m.id === id);
                if (!exists) {
                    showToast('成员已不存在', 'error');
                    selectedMemberId = members[0]?.id || null;
                    renderSidebar();
                    return;
                }
                if (selectedMemberId !== id) {
                    selectedMemberId = id;
                    document.getElementById('globalSearch').checked = false;
                    searchFilters.global = false;
                    clearSearch();
                    hideForm();
                    renderSidebar();
                } else {
                    renderWorkspace(id);
                }
            }

            // ============================================================
            //  搜索相关
            // ============================================================
            function getSearchFilters() {
                const name = document.getElementById('searchName').value.trim();
                const date = document.getElementById('searchDate').value;
                const keyword = document.getElementById('searchKeyword').value.trim();
                const risk = document.getElementById('searchRisk').value;
                const global = document.getElementById('globalSearch').checked;
                return { name, date, keyword, risk, global };
            }

            function applySearch() {
                searchFilters = getSearchFilters();
                renderWorkspace(selectedMemberId);
                hideForm();
            }

            function clearSearch() {
                document.getElementById('searchName').value = '';
                document.getElementById('searchDate').value = '';
                document.getElementById('searchKeyword').value = '';
                document.getElementById('searchRisk').value = '';
                if (selectedMemberId !== 'all') {
                    document.getElementById('globalSearch').checked = false;
                    searchFilters.global = false;
                } else {
                    document.getElementById('globalSearch').checked = true;
                    searchFilters.global = true;
                }
                searchFilters.name = '';
                searchFilters.date = '';
                searchFilters.keyword = '';
                searchFilters.risk = '';
                hideForm();
                renderWorkspace(selectedMemberId);
            }

            // ============================================================
            //  渲染工作区
            // ============================================================
            function renderWorkspace(memberId) {
                const container = document.getElementById('workspaceContent');
                const nameEl = document.getElementById('selectedMemberName');
                const countEl = document.getElementById('reportCount');

                const members = loadMembers();
                let member = null;
                if (memberId !== 'all' && memberId) {
                    member = members.find(m => m.id === memberId);
                }

                let allReports = loadReports();

                let needSave = false;
                allReports = allReports.map(r => {
                    if (!r.problems && (r.issueName || r.issueDetail || r.issueProgress || r.hasRisk)) {
                        r.problems = [];
                        if (r.issueName || r.issueDetail || r.issueProgress || r.hasRisk) {
                            r.problems.push({
                                name: r.issueName || '',
                                detail: r.issueDetail || '',
                                progress: r.issueProgress || '',
                                risk: r.hasRisk || ''
                            });
                        }
                        needSave = true;
                    }
                    if (!r.problems) r.problems = [];
                    return r;
                });
                if (needSave) saveReports(allReports);

                let filteredReports = [];
                if (memberId === 'all' || searchFilters.global) {
                    filteredReports = allReports.slice();
                } else {
                    if (member) {
                        filteredReports = allReports.filter(r => r.memberId === memberId);
                    } else {
                        filteredReports = [];
                    }
                }

                if (searchFilters.name) {
                    const nameKw = searchFilters.name.toLowerCase();
                    filteredReports = filteredReports.filter(r => {
                        const author = members.find(m => m.id === r.memberId)?.name || '';
                        return author.toLowerCase().includes(nameKw);
                    });
                }

                if (searchFilters.date) {
                    filteredReports = filteredReports.filter(r => r.date === searchFilters.date);
                }

                if (searchFilters.keyword) {
                    const kw = searchFilters.keyword.toLowerCase();
                    filteredReports = filteredReports.filter(r => {
                        const work = (r.work || '').toLowerCase();
                        let problemMatch = false;
                        if (r.problems && r.problems.length) {
                            for (let p of r.problems) {
                                const name = (p.name || '').toLowerCase();
                                const detail = (p.detail || '').toLowerCase();
                                const progress = (p.progress || '').toLowerCase();
                                if (name.includes(kw) || detail.includes(kw) || progress.includes(kw)) {
                                    problemMatch = true;
                                    break;
                                }
                            }
                        }
                        return work.includes(kw) || problemMatch;
                    });
                }

                if (searchFilters.risk) {
                    const riskVal = searchFilters.risk;
                    filteredReports = filteredReports.filter(r => {
                        if (!r.problems || r.problems.length === 0) return false;
                        for (let p of r.problems) {
                            if ((p.risk || '').trim() === riskVal) return true;
                        }
                        return false;
                    });
                }

                filteredReports.sort((a, b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id));

                if (memberId === 'all') {
                    nameEl.textContent = '所有成员';
                    countEl.textContent = `${filteredReports.length} 篇`;
                } else if (member) {
                    nameEl.textContent = member.name;
                    countEl.textContent = `${filteredReports.length} 篇`;
                } else {
                    nameEl.textContent = '请选择成员';
                    countEl.textContent = '0 篇';
                }

                // ----- 构建全局表单 -----
                const savedKey = getApiKey();
                const formHtml = `
                    <div class="submit-card hidden-section" id="submitCard">
                        <div class="form-title">✏️ 写日报</div>
                        <form id="reportForm" autocomplete="off">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>姓名 <span class="required">*</span></label>
                                    <input type="text" id="formNameInput" placeholder="输入成员姓名" required />
                                </div>
                                <div class="form-group">
                                    <label>日期 <span class="required">*</span></label>
                                    <input type="date" id="formDate" required />
                                </div>
                            </div>
                            <div class="form-group">
                                <label>今日工作内容 <span class="required">*</span></label>
                                <textarea id="formWork" placeholder="请详细描述今天完成的工作任务…" required></textarea>
                                <button type="button" class="btn-smart" id="smartRecognizeBtn">🤖 智能识别</button>
                            </div>
                            <div class="api-key-area">
                                <label for="apiKeyInput">🔑 DeepSeek API Key</label>
                                <input type="password" id="apiKeyInput" placeholder="输入您的 API Key（保存至本地）" value="${escapeHtml(savedKey)}" />
                                <span class="hint">
                                    <a href="https://platform.deepseek.com/api_keys" target="_blank">获取 Key</a> · 
                                    新用户赠 $5 额度
                                </span>
                            </div>

                            <div class="form-group">
                                <label>问题信息 <span style="font-weight:400;color:var(--gray-400);font-size:12px;">（可添加多个）</span></label>
                                <div class="problem-entries" id="problemEntries"></div>
                                <button type="button" class="btn-add-problem" id="addProblemBtn">➕ 添加问题</button>
                            </div>

                            <button type="submit" class="btn-primary">✅ 提交日报</button>
                        </form>
                    </div>
                `;

                // ----- 构建日报列表 -----
                let listHtml = '';
                if (filteredReports.length === 0) {
                    listHtml = `
                        <div class="empty-reports">
                            <span class="icon">📭</span>
                            <p>${searchFilters.date || searchFilters.keyword || searchFilters.name || searchFilters.risk ? '没有匹配的日报' : '暂无日报，写一篇吧'}</p>
                        </div>
                    `;
                } else {
                    const grouped = {};
                    for (let item of filteredReports) {
                        const key = item.memberId;
                        if (!grouped[key]) grouped[key] = [];
                        grouped[key].push(item);
                    }
                    for (let key in grouped) {
                        grouped[key].sort((a, b) => a.date.localeCompare(b.date));
                    }
                    let displayList = [];
                    for (let key in grouped) {
                        const items = grouped[key];
                        for (let i = items.length - 1; i >= 0; i--) {
                            const item = items[i];
                            const prevItem = (i > 0) ? items[i - 1] : null;
                            displayList.push({ item, prevItem });
                        }
                    }
                    displayList.sort((a, b) => {
                        if (a.item.date !== b.item.date) return b.item.date.localeCompare(a.item.date);
                        const nameA = members.find(m => m.id === a.item.memberId)?.name || '';
                        const nameB = members.find(m => m.id === b.item.memberId)?.name || '';
                        return nameA.localeCompare(nameB);
                    });

                    for (let entry of displayList) {
                        const item = entry.item;
                        const prevItem = entry.prevItem;
                        let prevMap = {};
                        if (prevItem && prevItem.problems) {
                            prevItem.problems.forEach(p => {
                                if (p.name) prevMap[p.name.trim()] = { detail: p.detail || '', progress: p.progress || '' };
                            });
                        }

                        const author = members.find(m => m.id === item.memberId)?.name || '未知';
                        const dateDisplay = formatDate(item.date);
                        let problemsHtml = '';
                        if (item.problems && item.problems.length > 0) {
                            problemsHtml = `<span class="label">📌 问题信息</span><div class="problem-list">`;
                            for (let p of item.problems) {
                                const pName = escapeHtml(p.name || '');
                                const pDetail = escapeHtml(p.detail || '');
                                const pProgress = escapeHtml(p.progress || '');
                                const pRisk = escapeHtml(p.risk || '');
                                let prevInfo = '';
                                const trimmedName = (p.name || '').trim();
                                if (trimmedName && prevMap[trimmedName]) {
                                    const prev = prevMap[trimmedName];
                                    const prevDetail = escapeHtml(prev.detail);
                                    const prevProgress = escapeHtml(prev.progress);
                                    if (prevDetail || prevProgress) {
                                        prevInfo = `<div class="prev-info">📅 前一天：${prevDetail ? `详情：${prevDetail}` : ''}${prevDetail && prevProgress ? ' · ' : ''}${prevProgress ? `进展：${prevProgress}` : ''}</div>`;
                                    }
                                }
                                problemsHtml += `
                                    <div class="problem-item">
                                        ${pName ? `<span class="p-label">名称：</span><span class="p-value">${pName}</span> ` : ''}
                                        ${pDetail ? `<br><span class="p-label">详情：</span><span class="p-value">${pDetail}</span>` : ''}
                                        ${pProgress ? `<br><span class="p-label">进展：</span><span class="p-value">${pProgress}</span>` : ''}
                                        ${pRisk ? `<br><span class="p-label">风险：</span><span class="p-value">${pRisk}</span>` : ''}
                                        ${prevInfo}
                                    </div>
                                `;
                            }
                            problemsHtml += `</div>`;
                        } else {
                            problemsHtml = `<span class="label">📌 问题信息</span><div style="color:var(--gray-400);padding:6px 0;">暂无问题记录</div>`;
                        }

                        listHtml += `
                            <div class="report-item" data-id="${item.id}">
                                <div class="report-header">
                                    <span class="report-author">
                                        <span class="toggle-icon" data-id="${item.id}">▶</span>
                                        👤 ${escapeHtml(author)}
                                    </span>
                                    <span class="report-date">📅 ${dateDisplay}</span>
                                </div>
                                <div class="report-detail-wrapper collapsed" data-id="${item.id}">
                                    <div class="report-body">
                                        ${problemsHtml}
                                    </div>
                                    <div class="report-actions">
                                        <button class="btn-danger-small btn-delete-report" data-id="${item.id}">🗑 删除</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                }

                container.innerHTML = formHtml + listHtml;

                // 设置日期默认值
                const dateInput = document.getElementById('formDate');
                if (dateInput) dateInput.value = getTodayStr();

                // 初始化问题条目
                const problemEntries = document.getElementById('problemEntries');
                if (problemEntries) {
                    problemEntries.innerHTML = '';
                    addProblemEntry(problemEntries, { name: '', detail: '', progress: '', risk: '' });
                }

                // 绑定折叠展开事件
                document.querySelectorAll('.report-header').forEach(header => {
                    header.addEventListener('click', function(e) {
                        if (e.target.classList.contains('btn-delete-report')) return;
                        const id = this.querySelector('.toggle-icon')?.dataset.id;
                        if (!id) return;
                        const wrapper = document.querySelector(`.report-detail-wrapper[data-id="${id}"]`);
                        const icon = this.querySelector('.toggle-icon');
                        if (wrapper) {
                            wrapper.classList.toggle('collapsed');
                            if (icon) {
                                icon.classList.toggle('expanded');
                                icon.textContent = wrapper.classList.contains('collapsed') ? '▶' : '▼';
                            }
                        }
                    });
                });

                // 绑定 API Key 保存
                const apiKeyInput = document.getElementById('apiKeyInput');
                if (apiKeyInput) {
                    apiKeyInput.addEventListener('change', function() {
                        setApiKey(this.value.trim());
                        showToast('✅ API Key 已保存', 'success');
                    });
                }

                // 绑定智能识别按钮
                const recognizeBtn = document.getElementById('smartRecognizeBtn');
                if (recognizeBtn) {
                    recognizeBtn.addEventListener('click', async function() {
                        const workText = document.getElementById('formWork').value;
                        if (!workText.trim()) {
                            showToast('请先填写今日工作内容', 'error');
                            return;
                        }
                        this.textContent = '⏳ 识别中...';
                        this.disabled = true;
                        try {
                            const problems = await smartRecognizeMultiple(workText);
                            const container = document.getElementById('problemEntries');
                            if (container) {
                                container.innerHTML = '';
                                if (problems.length === 0) {
                                    addProblemEntry(container, { name: '', detail: '', progress: '', risk: '' });
                                } else {
                                    for (let p of problems) {
                                        addProblemEntry(container, {
                                            name: p.name || '',
                                            detail: p.detail || '',
                                            progress: p.progress || '',
                                            risk: p.risk || ''
                                        });
                                    }
                                }
                                showToast(`✅ 识别完成，共 ${problems.length} 个问题`, 'success');
                            }
                        } catch (err) {
                            const msg = err.message || '识别失败';
                            if (msg.includes('余额不足')) {
                                showToast('⚠️ DeepSeek 余额不足，已使用规则识别', 'warning');
                            } else {
                                showToast('⚠️ ' + msg, 'warning');
                            }
                            const fallback = ruleBasedRecognizeMultiple(workText);
                            const container = document.getElementById('problemEntries');
                            if (container) {
                                container.innerHTML = '';
                                if (fallback.length === 0) {
                                    addProblemEntry(container, { name: '', detail: '', progress: '', risk: '' });
                                } else {
                                    for (let p of fallback) {
                                        addProblemEntry(container, {
                                            name: p.name || '',
                                            detail: p.detail || '',
                                            progress: p.progress || '',
                                            risk: p.risk || ''
                                        });
                                    }
                                }
                                showToast(`⚠️ 规则识别完成，共 ${fallback.length} 个问题`, 'warning');
                            }
                        } finally {
                            this.textContent = '🤖 智能识别';
                            this.disabled = false;
                        }
                    });
                }

                // 绑定添加问题按钮
                const addBtn = document.getElementById('addProblemBtn');
                if (addBtn) {
                    addBtn.addEventListener('click', function() {
                        const container = document.getElementById('problemEntries');
                        if (container) {
                            addProblemEntry(container, { name: '', detail: '', progress: '', risk: '' });
                        }
                    });
                }

                // 绑定删除日报事件
                container.querySelectorAll('.btn-delete-report').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const id = this.dataset.id;
                        if (confirm('确定要删除这篇日报吗？')) {
                            deleteReport(id);
                        }
                    });
                });

                // 绑定表单提交
                const form = document.getElementById('reportForm');
                if (form) {
                    form.addEventListener('submit', handleSubmit);
                }
            }

            // ============================================================
            //  提交日报
            // ============================================================
            async function handleSubmit(e) {
                e.preventDefault();

                const name = document.getElementById('formNameInput').value.trim();
                const date = document.getElementById('formDate').value;
                const work = document.getElementById('formWork').value.trim();

                const problemEntries = document.querySelectorAll('.problem-entry');
                const problems = [];
                for (let entry of problemEntries) {
                    const pName = entry.querySelector('.p-name').value.trim();
                    const pDetail = entry.querySelector('.p-detail').value.trim();
                    const pProgress = entry.querySelector('.p-progress').value.trim();
                    const pRisk = entry.querySelector('.p-risk').value;
                    if (pName || pDetail || pProgress || pRisk) {
                        problems.push({
                            name: pName,
                            detail: pDetail,
                            progress: pProgress,
                            risk: pRisk
                        });
                    }
                }

                if (!name) {
                    showToast('请输入姓名', 'error');
                    return;
                }
                if (!date) {
                    showToast('请选择日期', 'error');
                    return;
                }
                if (!work) {
                    showToast('请填写今日工作内容', 'error');
                    return;
                }

                const members = loadMembers();
                const member = members.find(m => m.name === name);
                if (!member) {
                    showToast(`成员 "${name}" 不存在，请先在左侧添加`, 'error');
                    return;
                }

                const memberId = member.id;
                const reports = loadReports();
                const exists = reports.some(r => r.memberId === memberId && r.date === date);
                if (exists) {
                    if (!confirm(`成员 "${name}" 在 ${formatDate(date)} 已有日报，是否覆盖？`)) {
                        return;
                    }
                    const filtered = reports.filter(r => !(r.memberId === memberId && r.date === date));
                    saveReports(filtered);
                }

                const newReport = {
                    id: generateId(),
                    memberId: memberId,
                    date: date,
                    work: work,
                    issues: '',
                    plan: '',
                    problems: problems,
                    createdAt: new Date().toISOString()
                };

                const allReports = loadReports();
                allReports.push(newReport);
                saveReports(allReports);

                document.getElementById('formWork').value = '';
                const container = document.getElementById('problemEntries');
                if (container) {
                    container.innerHTML = '';
                    addProblemEntry(container, { name: '', detail: '', progress: '', risk: '' });
                }
                document.getElementById('formDate').value = getTodayStr();

                // 同步到云端
                await syncToCloud();

                if (selectedMemberId !== 'all') {
                    selectMember(memberId);
                } else {
                    renderWorkspace('all');
                }
                showToast(`✅ 已为 ${name} 提交日报`, 'success');
                hideForm();
            }

            // ============================================================
            //  删除日报
            // ============================================================
            async function deleteReport(id) {
                let reports = loadReports();
                const newReports = reports.filter(r => r.id !== id);
                if (newReports.length === reports.length) {
                    showToast('日报不存在', 'error');
                    return;
                }
                saveReports(newReports);
                await syncToCloud();
                renderWorkspace(selectedMemberId);
                renderSidebar();
                showToast('🗑 已删除日报', 'success');
            }

            // ============================================================
            //  成员管理
            // ============================================================
            async function addMember(name) {
                name = name.trim();
                if (!name) {
                    showToast('请输入姓名', 'error');
                    return false;
                }
                const members = loadMembers();
                if (members.some(m => m.name === name)) {
                    showToast(`成员 "${name}" 已存在`, 'error');
                    return false;
                }
                const newMember = {
                    id: generateId(),
                    name: name,
                    createdAt: new Date().toISOString()
                };
                members.push(newMember);
                saveMembers(members);
                if (selectedMemberId !== 'all') {
                    selectedMemberId = newMember.id;
                }
                await syncToCloud();
                clearSearch();
                renderSidebar();
                showToast(`✅ 已添加成员 ${name}`, 'success');
                return true;
            }

            async function deleteMember(id) {
                const members = loadMembers();
                const member = members.find(m => m.id === id);
                if (!member) {
                    showToast('成员不存在', 'error');
                    return;
                }

                const reports = loadReports();
                const hasReports = reports.some(r => r.memberId === id);
                let confirmMsg = `确定要删除成员 "${member.name}" 吗？`;
                if (hasReports) {
                    confirmMsg += ` 该成员有 ${reports.filter(r => r.memberId === id).length} 篇日报，将一并删除。`;
                }
                if (!confirm(confirmMsg)) return;

                const newMembers = members.filter(m => m.id !== id);
                saveMembers(newMembers);

                const newReports = reports.filter(r => r.memberId !== id);
                saveReports(newReports);

                if (selectedMemberId === id) {
                    selectedMemberId = newMembers[0]?.id || null;
                }
                await syncToCloud();
                clearSearch();
                renderSidebar();
                showToast(`🗑 已删除成员 ${member.name}`, 'success');
            }

            // ============================================================
            //  移动端侧边栏切换
            // ============================================================
            let sidebarVisible = true;

            function toggleSidebar() {
                const sidebar = document.getElementById('sidebar');
                if (window.innerWidth <= 820) {
                    sidebarVisible = !sidebarVisible;
                    sidebar.style.display = sidebarVisible ? 'flex' : 'none';
                }
            }

            // ============================================================
            //  初始化
            // ============================================================
            async function init() {
                // 尝试从云端加载数据
                const loaded = await loadFromCloud();
                if (!loaded) {
                    console.log('云端无数据，使用本地数据');
                }

                // 默认显示全部成员
                selectedMemberId = 'all';
                document.getElementById('globalSearch').checked = true;
                searchFilters.global = true;

                renderSidebar();

                // 设置导出日期默认值
                document.getElementById('exportDate').value = getTodayStr();

                // 绑定“完整记录”按钮
                const fullBtn = document.getElementById('fullRecordBtn');
                if (fullBtn) {
                    fullBtn.addEventListener('click', function() {
                        selectMember('all');
                    });
                }

                // 导出日报
                document.getElementById('exportReportBtn').addEventListener('click', function() {
                    const date = document.getElementById('exportDate').value;
                    exportDailyReports(date);
                });
                document.getElementById('exportDate').addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        document.getElementById('exportReportBtn').click();
                    }
                });

                // 导出/导入数据
                document.getElementById('exportBtn').addEventListener('click', function() {
                    const data = {
                        members: loadMembers(),
                        reports: loadReports(),
                        exportedAt: new Date().toISOString()
                    };
                    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `daily_reports_${new Date().toISOString().slice(0,10)}.json`;
                    a.click();
                    URL.revokeObjectURL(url);
                    showToast('✅ 数据导出成功', 'success');
                });

                document.getElementById('importBtn').addEventListener('click', function() {
                    document.getElementById('importFileInput').click();
                });
                document.getElementById('importFileInput').addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = async function(ev) {
                        try {
                            const data = JSON.parse(ev.target.result);
                            if (data.members && data.reports) {
                                if (confirm(`即将导入 ${data.members.length} 名成员和 ${data.reports.length} 篇日报，是否覆盖当前数据？`)) {
                                    saveMembers(data.members);
                                    saveReports(data.reports);
                                    await syncToCloud();
                                    renderSidebar();
                                    showToast('✅ 数据导入成功', 'success');
                                }
                            } else {
                                showToast('❌ 无效的数据文件', 'error');
                            }
                        } catch (err) {
                            showToast('❌ 文件解析失败', 'error');
                        }
                    };
                    reader.readAsText(file);
                    this.value = '';
                });

                const addBtn = document.getElementById('addMemberBtn');
                const input = document.getElementById('newMemberInput');

                function handleAdd() {
                    const val = input.value;
                    const success = addMember(val);
                    if (success) input.value = '';
                }

                addBtn.addEventListener('click', handleAdd);
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        handleAdd();
                    }
                });

                document.getElementById('searchBtn').addEventListener('click', applySearch);
                document.getElementById('resetSearchBtn').addEventListener('click', clearSearch);

                ['searchName', 'searchDate', 'searchKeyword', 'searchRisk'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) {
                        el.addEventListener('keydown', function(e) {
                            if (e.key === 'Enter') {
                                e.preventDefault();
                                applySearch();
                            }
                        });
                    }
                });

                document.getElementById('toggleSearchBtn').addEventListener('click', function() {
                    const bar = document.getElementById('searchBar');
                    if (bar) {
                        bar.classList.toggle('hidden-section');
                        this.classList.toggle('active-btn');
                    }
                });

                document.getElementById('toggleFormBtn').addEventListener('click', function() {
                    const card = document.getElementById('submitCard');
                    if (card) {
                        const isHidden = card.classList.contains('hidden-section');
                        card.classList.toggle('hidden-section');
                        this.classList.toggle('active-btn');
                        if (!card.classList.contains('hidden-section')) {
                            setTimeout(() => {
                                card.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            }, 100);
                        }
                    } else {
                        showToast('请先添加成员（表单将在有成员后显示）', 'error');
                    }
                });

                document.getElementById('mobileToggle').addEventListener('click', toggleSidebar);

                window.addEventListener('resize', function() {
                    if (window.innerWidth > 820) {
                        document.getElementById('sidebar').style.display = 'flex';
                        sidebarVisible = true;
                    } else {
                        if (sidebarVisible === undefined) sidebarVisible = true;
                        document.getElementById('sidebar').style.display = sidebarVisible ? 'flex' : 'none';
                    }
                });

                document.addEventListener('keydown', function(e) {
                    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                        const form = document.getElementById('reportForm');
                        if (form) {
                            e.preventDefault();
                            form.dispatchEvent(new Event('submit'));
                        }
                    }
                });

                const searchBtn = document.getElementById('toggleSearchBtn');
                if (searchBtn) searchBtn.classList.remove('active-btn');
                const formBtn = document.getElementById('toggleFormBtn');
                if (formBtn) formBtn.classList.remove('active-btn');

                console.log('📋 团队日报系统（完整功能）已启动');
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>
</body>
</html>
